name: DSF 2.x Full Build

on:
  pull_request:
    branches: [develop]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  maven-quick-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository 
        uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 25
          cache: 'maven'
      - name: Minimal Maven Build
        run: mvn install --batch-mode --fail-at-end -P!generate-source-and-javadoc-jars -Dimpsort.skip=true -Dformatter.skip=true -Dlicense.skip=true -Denforcer.skip -DskipTests
      - name: Upload bpe_proxy client_ca_chains
        uses: actions/upload-artifact@v6
        with:
          name: bpe_proxy_client_ca_chains
          path: dsf-docker/bpe_proxy/ca/client_ca_chains/*.crt
      - name: Upload bpe_proxy client_issuing_cas
        uses: actions/upload-artifact@v6
        with:
          name: bpe_proxy_client_issuing_cas
          path: dsf-docker/bpe_proxy/ca/client_issuing_cas/*.crt
      - name: Upload fhir_proxy client_ca_chains
        uses: actions/upload-artifact@v6
        with:
          name: fhir_proxy_client_ca_chains
          path: dsf-docker/fhir_proxy/ca/client_ca_chains/*.crt
      - name: Upload fhir_proxy client_issuing_cas
        uses: actions/upload-artifact@v6
        with:
          name: fhir_proxy_client_issuing_cas
          path: dsf-docker/fhir_proxy/ca/client_issuing_cas/*.crt
      - name: Upload bpe_proxy files
        uses: actions/upload-artifact@v6
        with:
          name: bpe_proxy
          path: |
            dsf-docker/bpe_proxy/ca/client_ca_chains/*.crt
            dsf-docker/bpe_proxy/ca/client_issuing_cas/*.crt

  proxy-docker-build:
    # if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    needs: maven-quick-build
    permissions:
      packages: write
    strategy:
      matrix:
        service: [bpe_proxy, fhir_proxy]
    steps:
      - name: Checkout repository 
        uses: actions/checkout@v6
      - name: Download client_ca_chains
        uses: actions/download-artifact/@v7
        with:
          name: ${{ matrix.service }}_client_ca_chains
          path: dsf-docker/${{ matrix.service }}/ca/client_ca_chains/
      - name: Download client_issuing_cas
        uses: actions/download-artifact/@v7
        with:
          name: ${{ matrix.service }}_client_issuing_cas
          path: dsf-docker/${{ matrix.service }}/ca/client_issuing_cas/
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:develop
          context: dsf-docker/${{ matrix.service }}
          file: dsf-docker/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64