name: DSF 2.x Full Build

on:
  pull_request:
    branches: [develop]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  maven-quick-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository 
        uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 25
          cache: 'maven'
      - name: Minimal Maven Build
        run: mvn install --batch-mode --fail-at-end -P!generate-source-and-javadoc-jars -Dimpsort.skip=true -Dformatter.skip=true -Dlicense.skip=true -Denforcer.skip -DskipTests
      - name: Upload bpe_proxy ca files
        uses: actions/upload-artifact@v6
        with:
          name: bpe_proxy
          path: |
            dsf-docker/bpe_proxy/ca/client_ca_chains/*.crt
            dsf-docker/bpe_proxy/ca/client_issuing_cas/*.crt
      - name: Upload fhir_proxy ca files
        uses: actions/upload-artifact@v6
        with:
          name: fhir_proxy
          path: |
            dsf-docker/fhir_proxy/ca/client_ca_chains/*.crt
            dsf-docker/fhir_proxy/ca/client_issuing_cas/*.crt

  proxy-docker-build:
    # if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    needs: maven-quick-build
    permissions:
      packages: write
    strategy:
      matrix:
        service: [bpe_proxy, fhir_proxy]
    steps:
      - name: Checkout repository 
        uses: actions/checkout@v6
      - name: Download ca files
        uses: actions/download-artifact/@v7
        with:
          name: ${{ matrix.service }}
          path: dsf-docker/${{ matrix.service }}/ca/
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:develop
          context: dsf-docker/${{ matrix.service }}
          file: dsf-docker/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  maven-full-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository 
        uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 25
          cache: 'maven'
      - name: Full Maven Build
        run: mvn verify --batch-mode --fail-at-end -DforkCount=2
      - name: Upload bpe files
        uses: actions/upload-artifact@v6
        with:
          name: bpe
          path: |
            dsf-bpe/dsf-bpe-server-jetty/docker/api/v1/*.jar
            dsf-bpe/dsf-bpe-server-jetty/docker/api/v2/*.jar
            dsf-bpe/dsf-bpe-server-jetty/docker/ca/client_ca_chains/*.crt
            dsf-bpe/dsf-bpe-server-jetty/docker/ca/server_root_cas/*.crt
            dsf-bpe/dsf-bpe-server-jetty/docker/lib/*.jar
      - name: Upload fhir files
        uses: actions/upload-artifact@v6
        with:
          name: fhir
          path: |
            dsf-fhir/dsf-fhir-server-jetty/docker/ca/client_ca_chains/*.crt
            dsf-fhir/dsf-fhir-server-jetty/docker/ca/server_root_cas/*.crt
            dsf-fhir/dsf-fhir-server-jetty/docker/lib/*.jar

  app-docker-build:
    # if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    needs: maven-full-build
    permissions:
      packages: write
    strategy:
      matrix:
        service: [bpe, fhir]
    steps:
      - name: Checkout repository 
        uses: actions/checkout@v6
